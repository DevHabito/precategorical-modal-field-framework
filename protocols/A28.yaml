interpretation:
  allowed_claims:
  - No nontrivial continuous cardinal score satisfies the full audited axiom package.
  forbidden_claims:
  - No meaningful cardinal score or contextual kernel can exist under any alternative assumptions.
  limitations:
  - The no-go applies only to the exact continuity, extension-stability, and positive-affine-invariance axioms stated
    in A28.
  - The score audit is not a search over all conceivable contextual state representations.
  summary_boundary: A28 does not show that context dependence is always physically unacceptable, nor that a calibrated
    raw-q score is impossible. It proves that the desired properties cannot all be obtained for free from the current
    relational and gauge structure.
reproduction:
