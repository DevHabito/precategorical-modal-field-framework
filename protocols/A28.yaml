procedure:
- Audit six score constructions for relabel equivariance, positive-affine invariance, context extension stability,
  locality, monotone cardinality, raw-scale sensitivity, and robustness.
- Use the exact argument in the theorem note to show incompatibility of the selected universal axioms.
