parameters:
  SEED: 20260721
  N_VALUES:
  - 128
  - 256
  - 512
  SAMPLES_PER_N: 30
  HISTOGRAM_BINS: 24
  TRANSFORMS:
    power_anisotropic:
      description: u'=u^4, v'=sqrt(v)
    beta_skew_opposed:
      description: u'=BetaPPF(u;2,5), v'=BetaPPF(v;5,2)
    power_isotropic_extreme:
      description: u'=u^8, v'=v^8
generators:
- name: coordinate_samples_and_monotone_transforms
  implementation_functions:
  - relation_from_coordinates
  - transform_coordinates
  description: Samples latent coordinate clouds at the frozen sizes and applies the three declared strictly increasing
    coordinate transformations.
- name: opposing_diagonal_control
  implementation_functions:
  - opposing_diagonal_control
  description: Constructs a non-monotone/copula-changing control used to verify that the audit is not insensitive
    to all transformations.
procedure:
- Generate paired latent coordinate samples.
- Apply each strictly increasing transform and compare the complete relation matrices and relation-derived summaries
  exactly.
- Audit density normalization and contrasting copula controls.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_EXACT_ORDER_MEASURE_IDENTIFIABILITY_LIMIT_ROBUST
  expected_gates:
    G1_all_monotone_transform_relations_bitwise_identical: true
    G2_all_coordinate_ranks_identical: true
    G3_all_relation_hashes_identical: true
    G4_interval_abundance_and_interval_sizes_identical: true
    G5_coordinate_distributions_strongly_changed: true
    G6_pushforward_densities_normalized: true
    G7_nonseparable_copula_control_changes_order_statistics: true
    G8_same_cardinality_in_every_pair: true
    G9_impossibility_follows_from_identical_input: true
  metric_snapshot: {}
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
