interpretation:
  allowed_claims:
  - Strict coordinatewise monotone recalibrations preserve product order exactly, so order-only estimators cannot
    identify the transformed marginals.
  forbidden_claims:
  - The 270 numerical pairs establish a new theorem or prove that no enriched relational theory can identify measure.
  limitations:
  - The numerical pairs are regression checks for a theorem that follows from strict monotonicity; they are not
    independent empirical evidence.
  - The no-go applies to estimators that receive only the order/relation object.
  summary_boundary: The ambiguity concerns the choice of sampling measure or conformal-volume representative. It
    does not say that causal structure contains no geometric information, nor does it contradict continuum statements
    in which causal structure is supplemented by an independently specified local volume element.
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
