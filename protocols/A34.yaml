parameters:
  SEED: 20260808
  LAMBDA: 1.3
  ETA: 0.35
  CONTRACTION:
    source_expression: 1.0 - ETA / 2.0
  ASSOCIATIVITY_SAMPLES: 5000
  GAUGE_SAMPLES: 4000
  CUMULANT_SAMPLES: 3000
  MAX_EXACT_ERROR: 2.0e-11
  MIN_DYNAMIC_WITNESS_DIFFERENCE: 0.0001
  MIN_MOMENT_PAIR_DIFFERENCE: 0.001
generators:
- name: random_weighted_microdistributions
  implementation_functions:
  - associativity_audit
  - gauge_affine_audit
  - moment_insufficiency_audit
  description: Generates positive masses and q-valued microdistributions for static aggregation, affine covariance,
    and matched-moment witnesses.
- name: matched_effective_score_witnesses
  implementation_functions:
  - matched_q_mean_dynamic_witness
  - scalar_loss_witness
  description: Constructs different microstates with matched selected summaries and compares their future effective
    scores.
- name: cumulant_test_distributions
  implementation_functions:
  - cumulant_audit
  description: Generates distributions used to compare truncated cumulant approximations.
procedure:
- Verify static hierarchical associativity of Q_lambda.
- Verify gauge and affine identities.
- Construct same-moment and same-Q witnesses.
- Apply the centered contraction and compare future Q_lambda.
- Measure truncation error of cumulant expansions.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_STATIC_EFFECTIVE_SCORE_WITH_DYNAMIC_CLOSURE_OBSTRUCTION
  expected_gates:
    G1_associative_mass_score_aggregation_exact: true
    G2_global_q_shift_covariance_exact: true
    G3_affine_rescaling_identity_exact: true
    G4_mean_and_variance_do_not_determine_effective_score: true
    G5_same_mean_and_qeff_can_have_different_future: true
    G6_whole_partition_curve_closes_centered_contraction: true
    G7_scalar_qeff_alone_not_dynamically_closed: true
    G8_cumulant_expansion_improves_with_added_terms_at_small_lambda: true
    G9_static_projectivity_not_promoted_to_dynamic_closure: true
    G10_no_physical_free_energy_or_thermodynamic_claim: true
  metric_snapshot:
    lambda: 1.3
    eta: 0.35
    contraction: 0.825
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
