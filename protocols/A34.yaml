interpretation:
  allowed_claims:
  - Q_lambda is statically associative for the partition sum, but a single Q_lambda is not generally dynamically
    closed; the exact contraction transports Q along lambda.
  forbidden_claims:
  - Q_lambda is a universal thermodynamic state variable or a closed physical evolution variable.
  limitations:
  - The exact dynamic identity applies to the declared affine centered contraction, not arbitrary RZS graph dynamics.
  - Population Q_lambda requires finite exponential moments.
  summary_boundary: A34 establishes a static sufficient message and a dynamic no-go. It does not identify Q_eff
    as physical free energy, prove thermodynamics, or establish a closed RZS macrodynamics.
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
