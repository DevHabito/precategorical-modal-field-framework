  summary_sha256: d6efb1f931918ce3582c8b559ff4a019efa8e2f5bc96f541e14020c308763de7
environment:
  python: '>=3.11'
  dependencies:
  - numpy
  - pandas
  - scipy
  deterministic_blas_required: false
randomness:
  stochastic: false
  seed: null
  rng_implementation: null
  seed_scope: not applicable
parameters:
  N: 5
  EDGES:
    source_expression: '[(i, j) for i in range(N) for j in range(N) if i != j]'
  NUMBER_OF_GRAPHS:
    source_expression: 1 << len(EDGES)
  TOLERANCE: 1.0e-12
generators:
- name: all_loopless_labeled_digraphs_n5
  implementation_functions:
  - enumerate_adjacency
  description: Enumerates all 2^20 loopless labeled directed graphs and their historical minimum-representative
    condensation codes.
- name: all_linear_extensions
  implementation_functions:
  - linear_extensions
  description: Enumerates all linear extensions of each active quotient poset used by the mean-extension clock.
procedure:
- Enumerate historical A8 quotient-poset codes.
- Compute longest-chain depth, down/up balance, and mean linear-extension position.
- Test strict monotonicity on comparable pairs, injectivity, disagreement on incomparable pairs, reversal behavior,
  and single-edge perturbation sensitivity.
validation:
