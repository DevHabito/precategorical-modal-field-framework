    n_vertices: 5
    labeled_digraphs: 1048576
    unique_labeled_condensation_posets: 5234
    nontrivial_unique_condensation_posets: 5233
    fraction_nontrivial_posets_all_three_clocks_equal: 0.10376457099178292
    total_incomparable_pairs_across_unique_posets: 20048
    all_candidates_strict_on_comparable_pairs.depth: true
    all_candidates_strict_on_comparable_pairs.balance: true
    all_candidates_strict_on_comparable_pairs.mean_extension: true
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
