interpretation:
  allowed_claims:
  - The three audited scalarizations are monotone on comparable pairs but are not uniquely selected by the order.
  forbidden_claims:
  - The construction derives physical time, a unique clock, a rate, or a temporal arrow.
  limitations:
  - Uses the historical minimum-representative code rather than the 6,942 full labeled preorders.
  - Finite n=5 statistics do not establish asymptotic behavior or a physical clock.
  summary_boundary: null
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
