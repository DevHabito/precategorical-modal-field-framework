interpretation:
  allowed_claims:
  - The corrected diagnostic confirms CLT-aligned convergence for the selected finite-variance laws.
  forbidden_claims:
  - Gaussianity is derived for RZS or holds exactly at finite n.
  limitations:
  - This corrects the A36 empirical KS diagnostic; it does not add independence or finite-variance assumptions to
    the RZS model.
  - Characteristic-function convergence is asymptotic and observable-specific.
  summary_boundary: The corrected result supports the conditional CLT statement only. It does not turn centered
    RZS noise into Gaussian noise.
