- name: martingale_path_samples
  implementation_functions:
  - martingale_audit
  description: Samples paths for the frozen square-summable q-mark martingale.
procedure:
- Verify finite projective consistency and schedule independence.
- Construct an infinite nonterminal atomic path with mass limit 1/2 and a non-atomic bounded-branching example.
- Compare distinct measures on the same tree.
- Audit L2 convergence of a square-summable marked martingale and failure under a divergent schedule.
