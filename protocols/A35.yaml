interpretation:
  allowed_claims:
  - Mean-variance closure is exact in the Gaussian invariant family and fails generically outside it.
  forbidden_claims:
  - The RZS innovation law is Gaussian or has been physically derived.
  limitations:
  - Gaussian closure is conditional on Gaussian state and affine Gaussian innovations.
  - Centering alone is not a Gaussian-selection principle.
  summary_boundary: A35 establishes conditional probabilistic theorems and controls. It does not show that actual
    RZS q values are iid, Gaussian, exchangeable, or governed by Gaussian innovations.
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
