environment:
  python: '>=3.11'
  dependencies:
  - numpy
  - pandas
  - scipy
  deterministic_blas_required: false
randomness:
  stochastic: true
  seed: 20260808
  rng_implementation: numpy.random.default_rng
  seed_scope: single audit-level generator; see source for coupled substreams
parameters:
  SEED: 20260808
  A: 0.825
  INNOVATION_SD:
    source_expression: math.sqrt(1.0 - A * A)
  LAMBDA_VALUES:
  - 0.5
  - 1.0
  - 2.0
  TIME_STEPS:
    source_expression: tuple(range(0, 31))
  EMPIRICAL_N_VALUES:
  - 32
  - 128
  - 512
  - 2048
  EMPIRICAL_REPLICATES: 3000
  EMPIRICAL_BATCH_SIZE: 250
  CENTERING_DIMS:
  - 8
  - 16
  - 64
  - 256
  MAX_EXACT_ERROR: 2.0e-12
  MAX_MATCHED_NULL_FINAL_DIFFERENCE: 1.0e-08
  MIN_MATCHED_NULL_INITIAL_DIFFERENCE: 0.0001
  MIN_NONGAUSSIAN_EXCESS_ABS: 0.05
  MIN_STATIONARY_Q_DIFFERENCE: 0.0001
generators:
- name: matched_gaussian_and_nongaussian_nulls
  implementation_functions:
  - matched_null_log_mgf
  - matched_null_dynamics_audit
  description: Constructs Gaussian and matched-moment non-Gaussian initial laws.
- name: affine_innovation_processes
  implementation_functions:
  - gaussian_affine_closure_audit
  - stationary_rademacher_audit
  description: Runs affine recursions with Gaussian or Rademacher innovations at contraction a=0.825.
- name: centered_component_noise
  implementation_functions:
  - centered_noise_shape_audit
  description: Centers iid non-Gaussian components across frozen vector dimensions.
- name: finite_gaussian_samples
  implementation_functions:
  - empirical_gaussian_q_audit
  description: Samples finite Gaussian ensembles to quantify plug-in Q estimation error.
procedure:
- Verify exact Gaussian mean/variance/Q propagation.
- Compare matched non-Gaussian initial laws under Gaussian innovations.
- Compute stationary higher cumulants for non-Gaussian innovations.
- Audit whether centering creates Gaussian component shapes.
- Measure finite-sample Q error by n and lambda.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_GAUSSIAN_CLOSURE_CONDITIONAL_ON_INNOVATION_LAW
  expected_gates:
    G1_affine_gaussian_family_exactly_closed: true
    G2_gaussian_q_exactly_mean_variance_functional: true
    G3_same_mean_variance_nongaussian_nulls_differ_at_finite_time: true
    G4_gaussian_innovations_asymptotically_erase_higher_moments: true
    G5_higher_cumulants_decay_under_gaussian_innovations: true
    G6_nongaussian_innovations_generate_nongaussian_stationary_law: true
    G7_nongaussian_stationary_q_differs_from_gaussian_closure: true
    G8_centering_does_not_gaussianize_rademacher_noise: true
    G9_finite_empirical_gaussian_q_converges_with_sample_size: true
    G10_finite_sample_error_increases_with_lambda: true
    G11_population_closure_distinguished_from_empirical_estimator: true
    G12_gaussian_rzs_noise_not_claimed_or_derived: true
  metric_snapshot:
    contraction: 0.825
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
