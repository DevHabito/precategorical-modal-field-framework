  seed_scope: single audit-level generator; see source for coupled substreams
parameters:
  SEED: 20260811
  A: 0.825
  INNOVATION_SD:
    source_expression: math.sqrt(1.0 - A * A)
  LAMBDA_VALUES:
  - 0.5
  - 1.0
  - 2.0
  BLOCK_SIZES:
  - 1
  - 4
  - 16
  - 64
  - 256
  KERNEL_ROWS: 2500
  KERNEL_DIMENSION: 64
  KERNEL_BURN_IN: 140
  KERNEL_LAMBDA: 1.0
  MAX_EXACT_ERROR: 3.0e-12
  MIN_STATIONARY_EXCESS_SPREAD: 0.8
  MIN_STATIONARY_Q_SPREAD_LAMBDA_2: 0.3
  MAX_BLOCK_Q_ERROR_AT_256: 0.001
  MIN_KERNEL_MAX_PROBABILITY_SPREAD: 0.015
  MIN_COMMON_SHOCK_LIMIT_EXCESS_ABS: 1.9
generators:
- name: matched_variance_innovation_laws
  implementation_functions:
  - draw_innovation
  description: Uses Gaussian, Rademacher, uniform, Laplace, and standardized Student-t(8) innovations with matched
    variance.
- name: stationary_affine_process
  implementation_functions:
  - stationary_cumulant_audit
  - stationary_q_audit
  description: Evaluates analytic stationary cumulants and log-MGFs for contraction a=0.825.
- name: independent_block_sums
  implementation_functions:
  - block_q_universality_audit
  description: Computes Q_lambda of normalized independent blocks of sizes 1,4,16,64,256.
- name: standardized_transition_rows
  implementation_functions:
  - operational_kernel_audit
  description: Simulates stationary 64-dimensional rows, standardizes them, and applies an exponential kernel.
- name: common_shock_model
  implementation_functions:
  - dependence_obstruction_audit
  description: Evaluates a shared Rademacher factor plus idiosyncratic Gaussian components.
procedure:
- Match stationary variance across innovation laws.
- Compare higher cumulants and Q_lambda.
- Test independent-block convergence for light-tailed laws.
- Classify Student-t Q divergence.
- Measure standardized kernel sensitivity.
- Evaluate the common-factor dependence obstruction.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_CORRECTED_PARTIAL_NOISE_UNIVERSALITY_WITH_MOMENT_AND_DEPENDENCE_LIMITS
  expected_gates:
    G1_stationary_characteristic_function_and_cumulant_formula_stated: true
    G2_equal_stationary_mean_variance_do_not_fix_higher_cumulants: true
    G3_light_tailed_stationary_effective_scores_depend_on_noise_law: true
    G4_student_t_finite_variance_does_not_make_q_lambda_finite: true
    G5_independent_light_tailed_block_scores_converge_to_gaussian: true
    G6_student_t_block_q_remains_undefined_under_finite_block_averaging: true
    G7_common_nongaussian_factor_blocks_gaussian_universality: true
    G8_standardized_operational_kernel_retains_noise_law_sensitivity: true
    G9_variance_matching_and_centering_are_not_exact_universality_principles: true
    G10_universality_requires_independence_or_mixing_and_exponential_moment_control: true
    G11_no_physical_rzs_noise_law_claimed: true
  metric_snapshot:
    contraction: 0.825
    innovation_sd: 0.5651327277728658
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
