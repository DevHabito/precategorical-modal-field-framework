interpretation:
  allowed_claims:
  - Noise-law details disappear for some low-order observables and under conditional independent coarse-graining,
    but survive in higher, tail, exponential, and dependent observables.
  forbidden_claims:
  - The actual RZS noise law is macroscopically irrelevant or Gaussian.
  limitations:
  - The model is an affine centered q sector, not the full interacting RZS graph dynamics.
  - The block sum is a mathematical coarse-graining witness, not yet a derived physical coarse-graining rule.
  summary_boundary: A37 identifies universality classes in an affine stationary model. It does not prove that RZS
    relational components are independent copies, that their innovations have exponential moments, or that the audited
    block sum is the physical coarse-graining operation.
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
