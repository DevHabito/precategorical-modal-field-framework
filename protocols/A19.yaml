interpretation:
  allowed_claims:
  - The ensemble law of the induced coordinatewise order depends on the copula and is invariant to continuous monotone
    marginal changes.
  forbidden_claims:
  - A new copula theorem or recovery of physical volume from order alone.
  limitations:
  - The theorem requires continuous marginals and fixed copula.
  - Finite histogram thresholds are implementation/model checks, not the logical basis of Sklar invariance.
  summary_boundary: The theorem establishes marginal non-identifiability. It does not establish that the full copula
    is uniquely recoverable from order ensembles; distinct copulas may still share some or all finite-order probabilities.
