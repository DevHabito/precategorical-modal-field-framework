parameters:
  SEED: 20260722
  ORDER_SIZE: 6
  CATEGORY_COUNT:
    source_expression: math.factorial(ORDER_SIZE)
  ENSEMBLE_SIZE: 100000
  COUPLED_SAMPLES: 300
  COUPLED_ORDER_SIZE: 32
  COPULAS:
    independence: 0.0
    gaussian_positive: 0.6
    gaussian_negative: -0.6
  MARGINALS:
  - uniform
  - beta_skew
  - power_anisotropic
  SAME_COPULA_P_MIN: 0.0001
  SAME_COPULA_TV_MAX: 0.075
  SAME_COPULA_RELATION_RANGE_MAX: 0.004
  THEORY_RELATION_ERROR_MAX: 0.004
  DIFFERENT_COPULA_TV_MIN: 0.15
  DIFFERENT_COPULA_LOG10_P_MAX: -20.0
generators:
- name: gaussian_copula_uniforms
  implementation_functions:
  - gaussian_copula_uniforms
  description: Generates uniform pairs from independence and Gaussian copulas at correlations 0, +0.6, and -0.6.
- name: marginal_transforms
  implementation_functions:
  - apply_marginals
  description: Applies uniform, beta-skew, and anisotropic-power marginals without changing the copula.
- name: finite_order_categories
  implementation_functions:
  - rank_permutations
  - lehmer_codes
  description: Maps sampled finite orders to permutation-category codes for ensemble comparison.
procedure:
- Generate ensembles for every frozen copula-marginal combination.
- Compare category histograms and comparable-pair fractions within fixed copulas and across different copulas.
- Run coupled identity checks using common uniforms and marginal transformations.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_ENSEMBLE_COPULA_IDENTIFIABILITY_LIMIT
  expected_gates:
    G1_coupled_relations_and_hashes_identical: true
    G2_independence_permutation_uniformity: true
    G3_same_copula_homogeneity_tests: true
    G4_same_copula_total_variation_small: true
    G5_same_copula_ordering_fraction_stable: true
    G6_gaussian_ordering_fraction_matches_theory: true
    G7_different_copula_total_variation_large: true
    G8_different_copula_controls_rejected: true
    G9_infinite_ensemble_nonidentifiability_proved: true
    G10_no_claim_of_copula_injectivity: true
  metric_snapshot:
    order_size: 6
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
