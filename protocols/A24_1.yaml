    G2_uncoupled_q_empirically_silent: true
    G3_global_q_gauge_invariant: true
    G4_relabeling_equivariant: true
    G5_declared_locality_holds: true
    G6_local_q_contrast_changes_observable_law: true
    G7_gauge_equivalent_paths_identical: true
    G8_gauge_inequivalent_paths_diverge: true
    G9_q_contrasts_recoverable_when_beta_known: true
    G10_beta_q_scale_degeneracy_exact: true
    G11_local_kernel_has_additional_row_offset_gauge: true
    G12_actual_rzs_operational_origin_not_assumed: true
  metric_snapshot: {}
  numeric_tolerance:
