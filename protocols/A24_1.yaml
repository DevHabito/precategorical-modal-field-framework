  - scipy
  deterministic_blas_required: false
randomness:
  stochastic: true
  seed: 20260728
  rng_implementation: numpy.random.default_rng
  seed_scope: single audit-level generator; see source for coupled substreams
parameters:
  SEED: 20260728
  N_VALUES:
  - 16
  - 32
  - 64
  GRAPH_SAMPLES_PER_N: 80
  EDGE_PROBABILITY: 0.12
  BETA: 1.4
  LOCAL_PERTURBATION: 1.0
  STRUCTURED_PERTURBATION: 0.75
  TRANSITION_TRIALS_PER_NODE: 30000
  PATH_STEPS: 80
  MAX_NUMERICAL_ERROR: 3.0e-12
  MAX_CONTRAST_RMSE: 0.035
  MIN_PATH_DIVERGENCE_RATE: 0.95
  MAX_MEDIAN_FIRST_DIVERGENCE_STEP: 8.0
generators:
- name: strong_random_digraphs
  implementation_functions:
  - make_strong_digraph
  description: Generates strongly connected directed graphs at the frozen sizes and edge probability.
- name: q_fields
  implementation_functions:
  - sample_q
  - order_derived_q
  description: Generates independent q marks and order-derived comparison fields.
- name: transition_and_path_simulation
  implementation_functions:
  - transition_matrix
  - categorical_choice
  - simulate_path
  description: Builds exponential transition kernels and simulates categorical paths with frozen trial counts and
    path length.
procedure:
- Generate graph/q samples and exponential transition matrices at beta=1.4.
- Verify exact relabeling, local perturbation, and log-odds identities.
- Recover q contrasts from multinomial samples.
- Compare coupled paths under structured q perturbations.
validation:
