interpretation:
  allowed_claims:
  - Within the declared kernel, q contrasts are operationally encoded in transition log-odds.
  forbidden_claims:
  - The audit derives the exponential kernel, beta, or a physical transition law.
  limitations:
  - The exponential kernel and beta are supplied modeling assumptions.
  - Synthetic recovery assumes correct model specification and large transition counts.
  summary_boundary: The audit supplies criteria and a mathematical witness, not the missing physical bridge. The
    actual RZS q remains operationally ungrounded until its preparation, measurement, noise law, and coupling to
    observable events are specified independently of the desired emergent geometry.
reproduction:
