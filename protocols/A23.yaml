interpretation:
  allowed_claims:
  - An independent q mark can contain cardinal information unavailable from order; the current construction retains
    a global offset gauge.
  forbidden_claims:
  - q is physical distance, energy, or a derived field; D_eff is spacetime distance.
  limitations:
  - q is treated as a supplied quantitative mark; its physical origin is not derived.
  - D_eff is a computational path cost, not calibrated physical distance.
  - eta per algorithmic step is not a physical rate without a calibrated step duration.
  summary_boundary: This audit does not demonstrate that the existing RZS q is operationally independent, physically
    measurable, or tied to matter. It establishes the exact conditions it would have to satisfy to serve as the
    non-invariant primitive required by A20–A22.
reproduction:
