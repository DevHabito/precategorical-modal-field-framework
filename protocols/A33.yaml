environment:
  python: '>=3.11'
  dependencies:
  - numpy
  - pandas
  - scipy
  deterministic_blas_required: false
randomness:
  stochastic: true
  seed: 20260807
  rng_implementation: numpy.random.default_rng
  seed_scope: single audit-level generator; see source for coupled substreams
parameters:
  SEED: 20260807
  SAMPLES: 2200
  TREES_PER_SAMPLE: 6
  MIN_LEAVES: 6
  MAX_LEAVES: 28
  LAMBDA: 1.3
  MAX_EXACT_ERROR: 2.0e-11
  MIN_FAILURE_MEDIAN_PAIRWISE_TV: 0.035
  MIN_FAILURE_MEDIAN_TARGET_TV: 0.035
  MIN_TERMINAL_WEIGHT_TV: 0.04
  CANDIDATES:
  - uniform_child
  - descendant_count
  - base_mass
  - mean_q_softmax
  - mass_times_exp_mean_q
  - partition_sum
generators:
- name: random_weighted_trees
  implementation_functions:
  - random_tree
  - sample_audit
  description: Generates 2,200 random leaf configurations with 6-28 leaves and six regrouping trees per sample.
- name: candidate_subtree_weights
  implementation_functions:
  - child_weight
  - leaf_distribution
  description: Evaluates uniform-child, descendant-count, base-mass, q-mean, mass-times-exp-mean-q, and partition-sum
    candidates.
- name: terminal_weight_alternatives
  implementation_functions:
  - terminal_weight_underdetermination
  description: Constructs distinct terminal-weight assignments satisfying the same projective ratio architecture.
procedure:
- Compare leaf distributions produced by each candidate under alternative regrouping trees.
- Verify additive message recursion and q-gauge covariance for the partition sum.
- Audit maximum-entropy factorization and terminal-weight underdetermination.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_PROJECTIVE_RATIO_LAW_WITH_TERMINAL_WEIGHT_UNDERDETERMINATION
  expected_gates:
