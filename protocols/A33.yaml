    G2_uniform_child_rule_fails_regrouping: true
    G3_descendant_count_rule_exact_for_uniform_leaves: true
    G4_base_mass_rule_exact_for_supplied_mu: true
    G5_naive_mean_q_softmax_fails_regrouping: true
    G6_mass_times_exp_mean_q_fails_regrouping: true
    G7_partition_sum_q_rule_exact_and_projective: true
    G8_q_weighted_rules_global_shift_invariant: true
    G9_partition_sum_message_associative: true
    G10_maxent_leaf_solution_factorizes_exactly: true
    G11_projectivity_does_not_select_terminal_weights: true
    G12_no_mu_lambda_or_physical_split_law_claimed: true
  metric_snapshot:
    samples: 2200
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
