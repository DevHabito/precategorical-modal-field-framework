interpretation:
  allowed_claims:
  - Once additive weights are given, p(B|A)=W(B)/W(A) is exactly regrouping-consistent; the partition sum is an
    exact candidate weight.
  forbidden_claims:
  - Projectivity uniquely selects the physical weights or probability law.
  limitations:
  - The ratio law is conditional on positive additive subtree weights.
  - Projectivity does not derive W, mu, q, lambda, or terminal semantics.
  summary_boundary: A33 establishes conditional consistency requirements and rejects grouping-dependent shortcuts.
    It does not derive physical branching probabilities.
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
