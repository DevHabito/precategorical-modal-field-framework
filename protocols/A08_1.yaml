generators:
- name: all_loopless_labeled_digraphs_n5
  implementation_functions:
  - enumerate_adjacency
  description: Enumerates every one of the 2^20 loopless directed graphs on the labeled vertex set {0,...,4}.
- name: all_strict_partial_orders_k_le_5
  implementation_functions:
  - strict_poset_count
  description: Independently enumerates strict partial orders on k labeled elements for k=1,...,5.
- name: all_vertex_relabelings
  implementation_functions:
  - canonical_unlabeled_preorder_code
  description: Canonicalizes full preorder matrices under all 5! permutations.
procedure:
- Enumerate all loopless labeled n=5 digraphs and compute reflexive transitive closure.
- Recover SCC representatives from mutual reachability.
- Encode both the full labeled reachability preorder and the historical minimum-representative quotient-poset code.
- Count unique codes under both encodings and independently evaluate the two closed counting formulas.
- Canonicalize full codes under relabeling to obtain the unlabeled count.
- Construct an explicit collision for the historical code and audit every single-edge toggle under both encodings.
