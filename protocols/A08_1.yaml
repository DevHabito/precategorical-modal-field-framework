interpretation:
  allowed_claims:
  - 6,942 and 5,234 are correct counts of two explicitly different encodings.
  - The historical 5,234 label was ambiguous and is corrected by A8.1.
  forbidden_claims:
  - 5,234 is the number of complete labeled condensation structures.
  - 75/256 is a universal or asymptotic constant.
  limitations:
  - The exact edge-flip fraction is established only for n=5 under the uniform graph-edge-pair ensemble.
  - The formula for full preorders is an enumeration identity and should be checked against the classical finite-preorder
    literature before novelty is claimed.
  summary_boundary: null
