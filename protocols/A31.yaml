interpretation:
  allowed_claims:
  - Given leaf weights, the additive extension is unique and independent of refinement order.
  forbidden_claims:
  - The audit derives terminal constituents, ontic branching, or fundamental probability weights.
  limitations:
  - Terminal weights and their physical semantics are supplied, not derived.
  - Path independence does not select a unique ontology.
  summary_boundary: A31 proves mathematical path independence, not the existence of fundamental microstates. Leaf
    identities, terminality, weights, and creation rules remain extra structure.
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
