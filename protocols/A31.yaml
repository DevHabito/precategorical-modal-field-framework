environment:
  python: '>=3.11'
  dependencies:
  - numpy
  - pandas
  - scipy
  deterministic_blas_required: false
randomness:
  stochastic: true
  seed: 20260805
  rng_implementation: numpy.random.default_rng
  seed_scope: single audit-level generator; see source for coupled substreams
parameters:
  SEED: 20260805
  TREE_SAMPLES: 2500
  MERGE_ORDERS_PER_SAMPLE: 6
  COMMUTATION_SAMPLES: 3000
  DYNAMICS_SAMPLES: 500
  DYNAMICS_STEPS: 100
  ONTOLOGY_SAMPLES: 3000
  UNIFORM_COUNT_SAMPLES: 2000
  LAMBDA: 1.2
  MAX_EXACT_ERROR: 1.0e-11
  MIN_ONTIC_BRANCHING_MEDIAN_TV: 0.05
  MIN_ONTOLOGY_AMBIGUITY_MEDIAN_TV: 0.12
generators:
- name: random_refinement_trees
  implementation_functions:
  - leaf_state
  - merge_random
  - tree_audit
  description: Generates finite weighted leaf states and random hierarchical merge orders.
- name: split_and_commutation_schedules
  implementation_functions:
  - split
  - commute_audit
  - dynamics_audit
  description: Generates dynamic mass-preserving splits and alternative operation orders.
- name: ontology_comparisons
  implementation_functions:
  - ontic_audit
  - ontology_audit
  description: Constructs alternative branching/leaf ontologies that obey the same additive architecture.
procedure:
- Assign positive terminal weights and define internal masses by descendant sums.
- Compare direct and hierarchical aggregation across random merge orders.
- Test commutation and dynamic mass-preserving splits.
- Compare alternative ontologies and terminal weight assignments.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_REFINEMENT_TREE_MEASURE_PATH_INDEPENDENT_BUT_ONTOLOGY_UNDERDETERMINED
  expected_gates:
    G1_unique_additive_extension_theorem_proved: true
    G2_tree_parenthesization_path_independent: true
    G3_independent_refinements_commute: true
    G4_conservative_split_preserves_macro_observables: true
    G5_conservative_split_conserves_total_mass: true
    G6_equal_leaf_weights_reduce_to_counting_measure: true
    G7_ontic_unit_branching_is_not_conservative_refinement: true
    G8_terminal_leaf_ontology_not_fixed_by_additivity: true
    G9_refinement_history_and_terminal_ontology_distinguished: true
    G10_no_physical_microstate_or_volume_claimed: true
  metric_snapshot: {}
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
