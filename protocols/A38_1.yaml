generators:
- name: random_weighted_scalar_states
  implementation_functions:
  - scalar_associativity_audit
  - refinement_audit
  - gauge_covariance_audit
  description: Generates weighted q samples and random partitions for scalar aggregation tests.
- name: exponential_kernel_groups
  implementation_functions:
  - kernel_preservation_audit
  description: Generates random groups and compares direct microscopic exponential weights with macro scores.
- name: nested_graph_partitions
  implementation_functions:
  - random_nested_partition
  - graph_audit
  description: Generates random weighted q matrices, nested region partitions, and source occupancies.
- name: weighted_median_exact_witness
  implementation_functions:
  - weighted_median_counterexample
  description: Uses a frozen exact three-leaf counterexample to disprove median closure by mass-plus-median summaries.
procedure:
- Compare associativity, refinement invariance, and gauge covariance of candidate scalar operators.
- Test exact preservation of the exponential kernel.
- Audit nested partition-sum aggregation.
- Compare macro kernels under different source occupancies.
- Restore exact aggregation by carrying joint flow.
validation:
  mode: verdict_and_gates
  expected_verdict: PASS_CORRECTED_OBSERVABLE_RELATIVE_COARSE_GRAINING_WITH_OCCUPANCY_OBSTRUCTION
  expected_gates:
    G1_translation_covariant_quasi_arithmetic_classification_stated: true
    G2_weighted_arithmetic_associative_refinement_consistent_and_gauge_covariant: true
    G3_exponential_mean_associative_refinement_consistent_and_gauge_covariant: true
    G4_weighted_median_not_closed_by_mass_and_median_message: true
    G5_minimum_is_associative_but_mass_insensitive_extremal_control: true
    G6_unweighted_mean_is_clone_sensitive_under_mass_preserving_refinement: true
    G7_rms_fails_additive_gauge_covariance: true
    G8_exponential_mean_exactly_preserves_exponential_kernel: true
    G9_arithmetic_mean_does_not_preserve_exponential_kernel: true
    G10_nested_graph_partition_sum_aggregation_exact: true
    G11_macro_transition_depends_on_source_occupancy: true
    G12_supplied_occupancy_flow_aggregation_exact: true
    G13_coarse_graining_declared_observable_relative_not_unique: true
    G14_no_physical_lambda_or_source_occupancy_claimed: true
  metric_snapshot:
    lambda: 1.25
  numeric_tolerance:
    absolute: 1.0e-12
    relative: 1.0e-10
