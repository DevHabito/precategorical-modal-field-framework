interpretation:
  allowed_claims:
  - Coarse-graining is observable-relative; Q_lambda is exact for the exponential kernel, and dynamic graph aggregation
    additionally requires occupancy/flow or lumpability.
  forbidden_claims:
  - A unique physical coarse-graining, a derived lambda, or a fundamental occupancy field.
  limitations:
  - The quasi-arithmetic classification is classical and conditional on its regularity class.
  - The exponential kernel, lambda, partition, and source occupancy are supplied.
  summary_boundary: A38 determines consistency requirements relative to declared observables. It does not establish
    the physical exponential kernel, a physical lambda, a unique regional partition, or the occupancy measure required
    by dynamic coarse-graining.
reproduction:
  fresh_output_policy: Run in a clean checkout or remove the matching result directory before execution.
  comparison_policy: Compare summary seed, verdict, gates, metric snapshot, and output hashes. Floating CSV values
    may require declared tolerances across compatible library versions.
  failure_policy: A mismatch must be reported; do not overwrite archived canonical outputs silently.
