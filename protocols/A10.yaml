    fraction_all_comparable_triples_volume_additive: 0.8145766345123259
    fraction_comparable_pairs_longest_equals_interval: 0.9652698048220436
    single_edge_flip_fraction_changing_duration_signature: 0.29296875
    coarse_graining_counterexample.ratios.0: 1/2
