    source_expression: '[(i, j) for i in range(N) for j in range(N) if i != j]'
  NUMBER_OF_GRAPHS:
    source_expression: 1 << len(EDGES)
generators:
- name: all_loopless_labeled_digraphs_n5
  implementation_functions:
  - enumerate_adjacency
  description: Enumerates all n=5 loopless labeled digraphs and historical quotient codes.
- name: declared_control_structures
  implementation_functions:
  - control_structures
  description: Constructs exact small poset controls used to validate duration functions.
procedure:
- Compute cover relations, standard rank, unit-cover potentials, longest-chain distances, and interval volumes.
- Audit additivity over comparable triples and agreement among duration candidates.
- Measure variation within degree fibers and sensitivity to every single-edge toggle.
- Evaluate the explicit four-element coarse-graining counterexample.
