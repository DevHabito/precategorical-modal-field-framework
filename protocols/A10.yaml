interpretation:
  allowed_claims:
  - Longest-chain distance is the strongest audited ordinal-duration candidate at n=5.
  - The stated quotient example has no single multiplicative scale preserving both selected durations.
  forbidden_claims:
  - Longest-chain distance is physical proper time or a uniquely derived duration.
  limitations:
  - Finite n=5 ordinal durations only.
  - No calibration, continuum limit, or proper-time interpretation is supplied.
  summary_boundary: null
reproduction:
